name: backend-ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      DOTNET_VERSION: 9.0.x

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore -warnaserror

  test:
    runs-on: ubuntu-latest
    needs: build

    # SQL Server real para a suíte de integração (Api.Tests). Sem ele, os testes com [SqlServerFact]
    # podem cair em fallback e quebrar a cobertura esperada pelo quality gate.
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: "Strong_Passw0rd!"
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Strong_Passw0rd!' -No -Q 'SELECT 1' || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20

    env:
      DOTNET_VERSION: 9.0.x

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true

      - name: Restore tools
        run: dotnet tool restore

      - name: Test with merged coverage gate
        shell: pwsh
        env:
          CF_TEST_SQLSERVER: "Server=localhost,1433;Database={DB};User Id=sa;Password=Strong_Passw0rd!;TrustServerCertificate=True;Connect Timeout=60;MultipleActiveResultSets=true"
        run: ./scripts/coverage-gate.ps1 -Threshold 80

  security-and-sonar:
    runs-on: ubuntu-latest
    needs: build

    env:
      DOTNET_VERSION: 9.0.x
      SONAR_PROJECT_KEY: controle-financeiro-backend
      SONAR_PROJECT_NAME: controle-financeiro-backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true

      - name: Restore tools
        run: dotnet tool restore

      - name: Check vulnerable packages
        shell: pwsh
        run: |
          $report = dotnet list package --vulnerable --include-transitive
          $report
          if ($report -match 'has the following vulnerable packages' -or $report -match 'Critical' -or $report -match 'High') {
            exit 1
          }

      - name: Setup Java
        if: ${{ secrets.SONAR_TOKEN != '' && secrets.SONAR_HOST_URL != '' }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install SonarScanner
        if: ${{ secrets.SONAR_TOKEN != '' && secrets.SONAR_HOST_URL != '' }}
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Sonar Begin
        if: ${{ secrets.SONAR_TOKEN != '' && secrets.SONAR_HOST_URL != '' }}
        shell: bash
        run: |
          EXTRA_ARGS=""
          if [ -n "${{ secrets.SONAR_ORGANIZATION }}" ]; then
            EXTRA_ARGS="$EXTRA_ARGS /o:${{ secrets.SONAR_ORGANIZATION }}"
          fi
          dotnet-sonarscanner begin \
            /k:"${SONAR_PROJECT_KEY}" \
            /n:"${SONAR_PROJECT_NAME}" \
            /d:sonar.host.url="${{ secrets.SONAR_HOST_URL }}" \
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
            /d:sonar.qualitygate.wait=true \
            /d:sonar.cs.opencover.reportsPaths="**/coverage-collector/**/coverage.opencover.xml" \
            ${EXTRA_ARGS}

      - name: Sonar Build
        if: ${{ secrets.SONAR_TOKEN != '' && secrets.SONAR_HOST_URL != '' }}
        run: dotnet build --configuration Release --no-restore

      - name: Sonar End
        if: ${{ secrets.SONAR_TOKEN != '' && secrets.SONAR_HOST_URL != '' }}
        run: dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

      - name: Require Sonar configuration
        if: ${{ secrets.SONAR_TOKEN == '' || secrets.SONAR_HOST_URL == '' }}
        run: echo "Sonar disabled in CI because SONAR_TOKEN or SONAR_HOST_URL is missing. Configure secrets to enforce the quality gate."
