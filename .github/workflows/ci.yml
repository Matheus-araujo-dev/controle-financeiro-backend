name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

  test:
    name: Test (PostgreSQL)
    runs-on: ubuntu-latest
    needs: build

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: Strong_Passw0rd!
          POSTGRES_DB: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      CF_TEST_POSTGRES: "Host=localhost;Port=5432;Database={DB};Username=postgres;Password=Strong_Passw0rd!"

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore tools
        run: dotnet tool restore

      - name: Test with coverage gate
        shell: pwsh
        run: ./scripts/coverage-gate.ps1 -Threshold 80

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Check vulnerable packages
        shell: pwsh
        run: |
          $failed = $false
          Get-ChildItem src -Recurse -Filter *.csproj | ForEach-Object {
            $report = dotnet list $_.FullName package --vulnerable --include-transitive
            $report
            if ($report -match 'Critical' -or $report -match 'High') { $failed = $true }
          }
          if ($failed) { exit 1 }

  # Railway watches GitHub directly and deploys automatically.
  # "Wait for CI" is enabled on Railway so it only deploys after this workflow passes.
  # No explicit deploy step needed here.
